name: COLLATZ-NATIVE-MATH CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test Collatz Native Auditor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package
        run: |
          python -m pip install -e .

      - name: Install test dependencies
        run: |
          python -m pip install pytest

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Run Collatz Native Auditor smoke test
        run: |
          python -m collatz_native_auditor.cli --start 1 --end 1000 --out-dir ci_report

      - name: Show generated certificate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("ci_report/certificate.json")
          if not p.exists():
              raise SystemExit("Missing ci_report/certificate.json")

          data = json.loads(p.read_text(encoding="utf-8"))
          print(json.dumps(data, indent=2))
          PY
